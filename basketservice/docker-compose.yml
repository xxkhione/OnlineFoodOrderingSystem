services:
  basket_service:
    build: .
    container_name: SEN300BasketService
    ports:
      - "8001:8000"
    environment:
      REDIS_HOST: SEN300BasketServiceDBRedis
      REDIS_PORT: 6379
      BOOK_SERVICE_URL: http://SEN300CatalogService:5000/api/menu-items
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always
  redis:
    image: redis:latest
    container_name: SEN300BasketServiceDBRedis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sen300_network
    restart: always

volumes:
  redis_data:

networks:
  sen300_network:
    external: true