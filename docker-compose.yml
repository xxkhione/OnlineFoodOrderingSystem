services:
  catalog_service:
    build: ./catalogservice
    container_name: SEN300CatalogService
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://catalog_mongo:27017/
      EUREKA_SERVER: http://SEN300EurekaServer:8761/eureka/
      EUREKA_APP_NAME: catalogservice
      EUREKA_INSTANCE_HOST: catalog_service
      EUREKA_INSTANCE_PORT: 5000
      EUREKA_HEALTH_PATH: /health
    depends_on:
      catalog_mongo:
        condition: service_healthy
      eureka_server:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always
  basket_service:
    build: ./basketservice
    container_name: SEN300BasketService
    ports:
      - "8001:8000"
    environment:
      REDIS_HOST: basket_redis
      REDIS_PORT: 6379
      MENU_ITEM_SERVICE_URL: http://SEN300CatalogService:5000/api/menu-items
      CUSTOMER_SERVICE_URL: http://SEN300CustomerService:8080/api/customers
      EUREKA_SERVER: http://SEN300EurekaServer:8761/eureka/
      EUREKA_APP_NAME: basketservice
      EUREKA_INSTANCE_HOST: basket_service
      EUREKA_INSTANCE_PORT: 8000
      EUREKA_HEALTH_PATH: /health
    depends_on:
      basket_redis:
        condition: service_healthy
      eureka_server:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always
  customer_service:
    build: ./authservice_customerservice/customerservice
    container_name: SEN300CustomerService
    ports:
      - "8002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=customer_postgres;Port=5432;Database=customers;Username=postgres_user;Password=postgres!
      Spring__Application__Name: customerservice
      Eureka__Client__ServiceUrl: http://SEN300EurekaServer:8761/eureka/
      Eureka__Client__ShouldRegisterWithEureka: "true"
      Eureka__Client__ShouldFetchRegistry: "true"
      Eureka__Client__ValidateCertificates: "false"
      Eureka__Instance__Hostname: customer_service
      Eureka__Instance__Port: 8080
    depends_on:
      customer_postgres:
        condition: service_healthy
      eureka_server:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always
  auth_service:
    build: ./authservice_customerservice/authservice
    container_name: SEN300AuthService
    ports:
      - "8003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Spring__Application__Name: authservice
      Eureka__Client__ServiceUrl: http://SEN300EurekaServer:8761/eureka/
      Eureka__Client__ShouldRegisterWithEureka: "true"
      Eureka__Client__ShouldFetchRegistry: "true"
      Eureka__Client__ValidateCertificates: "false"
      Eureka__Instance__Hostname: auth_service
      Eureka__Instance__Port: 8080
    depends_on:
      customer_service:
        condition: service_started
      eureka_server:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always
  order_service:
    build: ./orderservice
    container_name: SEN300OrderService
    ports:
      - "8004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=order_postgres;Port=5432;Database=orders;Username=postgres_user;Password=postgres!
      MessageServiceUrl: http://SEN300MessageService:8080/api/messages
      Spring__Application__Name: orderservice
      Eureka__Client__ServiceUrl: http://SEN300EurekaServer:8761/eureka/
      Eureka__Client__ShouldRegisterWithEureka: "true"
      Eureka__Client__ShouldFetchRegistry: "true"
      Eureka__Client__ValidateCertificates: "false"
      Eureka__Instance__Hostname: order_service
      Eureka__Instance__Port: 8080
    depends_on:
      order_postgres:
        condition: service_healthy
      eureka_server:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always
  message_service:
    build: ./messageservice
    container_name: SEN300MessageService
    ports:
      - "8005:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Spring__Application__Name: messageservice
      Eureka__Client__ServiceUrl: http://SEN300EurekaServer:8761/eureka/
      Eureka__Client__ShouldRegisterWithEureka: "true"
      Eureka__Client__ShouldFetchRegistry: "true"
      Eureka__Client__ValidateCertificates: "false"
      Eureka__Instance__Hostname: message_service
      Eureka__Instance__Port: 8080
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka_server:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always

  catalog_mongo:
    image: mongo:latest
    container_name: SEN300CatalogServiceDBMongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sen300_network
    restart: always
  basket_redis:
    image: redis:latest
    container_name: SEN300BasketServiceDBRedis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sen300_network
    restart: always
  customer_postgres:
    image: postgres:16
    container_name: SEN300CustomerServiceDBPostgres
    environment:
      POSTGRES_DB: customers
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres!
    ports:
      - "5432:5432"
    volumes:
      - cpostgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d customers"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sen300_network
    restart: always
  order_postgres:
    image: postgres:16
    container_name: SEN300OrderServiceDBPostgres
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres!
    ports:
      - "5433:5432"
    volumes:
      - opostgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sen300_network
    restart: always
  rabbitmq:
    image: rabbitmq:3-management
    container_name: SEN300MessageServiceRabbitMQ
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: appuser
      RABBITMQ_DEFAULT_PASS: apppass
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sen300_network
    restart: always
  eureka_server:
    image: steeltoeoss/eureka-server
    container_name: SEN300EurekaServer
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - sen300_network
    restart: always
  ocelot_gateway:
    build: ./ocelotgateway
    container_name: SEN300OcelotGateway
    ports:
      - "9000:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      eureka_server:
        condition: service_healthy
      catalog_service:
        condition: service_started
      basket_service:
        condition: service_started
      customer_service:
        condition: service_started
      auth_service:
        condition: service_started
      message_service:
        condition: service_started
      order_service:
        condition: service_started
    networks:
      - sen300_network
    restart: always

volumes:
  mongo_data:
  redis_data:
  cpostgres_data:
  opostgres_data:
  rabbitmq_data:

networks:
  sen300_network:
    external: true