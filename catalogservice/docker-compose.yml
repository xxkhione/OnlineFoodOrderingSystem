services:
  catalog_service:
    build: .
    container_name: SEN300CatalogService
    ports:
      - "5000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017/
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - sen300_network
    restart: always
  mongo:
    image: mongo:latest
    container_name: SEN300CatalogServiceDBMongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sen300_network
    restart: always

volumes:
  mongo_data:

networks:
  sen300_network:
    external: true